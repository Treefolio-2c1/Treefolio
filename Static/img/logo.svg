<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad" x1="60" y1="40" x2="160" y2="160" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4DD9C0"/>
      <stop offset="100%" stop-color="#1A7F70"/>
    </linearGradient>
  </defs>

  <!-- Cloud shape: two bumps + base -->
  <!-- Left bump -->
  <circle cx="72" cy="90" r="30" fill="none" stroke="url(#grad)" stroke-width="6"/>
  <!-- Right bump -->
  <circle cx="118" cy="84" r="36" fill="none" stroke="url(#grad)" stroke-width="6"/>
  <!-- Main bump (center top) -->
  <circle cx="95" cy="72" r="40" fill="none" stroke="url(#grad)" stroke-width="6"/>
  <!-- White fill to mask inner circle lines -->
  <rect x="42" y="90" width="116" height="60" fill="white"/>
  <!-- Bottom flat base arc -->
  <path d="M46 118 Q46 138 95 138 Q144 138 154 118" stroke="url(#grad)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <!-- Left side vertical line -->
  <line x1="46" y1="118" x2="46" y2="108" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>
  <!-- Right side vertical line -->
  <line x1="154" y1="118" x2="154" y2="108" stroke="url(#grad)" stroke-width="6" stroke-linecap="round"/>

  <!-- Tree trunk -->
  <line x1="95" y1="138" x2="95" y2="108" stroke="url(#grad)" stroke-width="5" stroke-linecap="round"/>

  <!-- Branch left-bottom -->
  <line x1="95" y1="120" x2="75" y2="132" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Branch right-bottom -->
  <line x1="95" y1="120" x2="115" y2="132" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Branch left-top -->
  <line x1="95" y1="108" x2="76" y2="96" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Branch right-top -->
  <line x1="95" y1="108" x2="114" y2="96" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>
  <!-- Branch center-top -->
  <line x1="95" y1="108" x2="95" y2="92" stroke="url(#grad)" stroke-width="4.5" stroke-linecap="round"/>

  <!-- Endpoint circles -->
  <!-- Top center -->
  <circle cx="95" cy="90" r="5.5" fill="white" stroke="url(#grad)" stroke-width="4"/>
  <!-- Top left -->
  <circle cx="75" cy="94" r="5.5" fill="white" stroke="url(#grad)" stroke-width="4"/>
  <!-- Top right -->
  <circle cx="115" cy="94" r="5.5" fill="white" stroke="url(#grad)" stroke-width="4"/>
  <!-- Bottom left -->
  <circle cx="74" cy="133" r="5.5" fill="white" stroke="url(#grad)" stroke-width="4"/>
  <!-- Bottom right -->
  <circle cx="116" cy="133" r="5.5" fill="white" stroke="url(#grad)" stroke-width="4"/>
</svg>
